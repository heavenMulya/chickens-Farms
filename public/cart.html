<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeatFresh - Your Cart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4342c;
            --secondary-color: #8b1a1a;
            --accent-color: #ffa726;
            --dark-color: #2c1810;
            --light-color: #f8f6f3;
            --meat-red: #c62828;
            --chicken-yellow: #ffb74d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fafafa;
        }

        .navbar {
            background: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color) !important;
        }

        .navbar-nav .nav-link {
            color: #333 !important;
            font-weight: 500;
            margin: 0 15px;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            color: var(--primary-color) !important;
        }

        .cart-icon {
            position: relative;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-left: 15px;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--secondary-color);
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-section {
            padding: 80px 0;
            background: white;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 20px;
        }

        .section-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .cart-table th, .cart-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-table th {
            background: var(--light-color);
            font-weight: 600;
            color: var(--dark-color);
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark-text);
        }

        .cart-item-price {
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.1);
        }

        .qty-display {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .btn-remove {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background: #ff9800;
        }

        .cart-summary {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .summary-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-row.total {
            border-top: 2px solid #f0f0f0;
            padding-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark-color);
        }

        .btn-primary-custom {
            background: var(--secondary-color);
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #ff9800;
            transform: translateY(-2px);
            color: white;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 2rem;
            }

            .cart-table th, .cart-table td {
                font-size: 0.9rem;
                padding: 10px;
            }

            .cart-item-image {
                width: 60px;
                height: 60px;
            }

            .cart-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-drumstick-bite"></i> MeatFresh</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#products">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link cart-icon" href="cart.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-badge" id="cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="cart-section">
        <div class="container">
            <h2 class="section-title mt-5">Your Cart</h2>
            <p class="section-subtitle">Review your selected items and proceed to checkout</p>
            <div id="cart-container">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                    </tbody>
                </table>
            </div>
            <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">0.00 TZS</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee:</span>
                    <span id="delivery">0.00 TZS</span>
                </div>
                <div class="summary-row">
                    <span>Tax (5%):</span>
                    <span id="tax">0.00 TZS</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">0.00 TZS</span>
                </div>
                <a href="index.html#products" class="btn-primary-custom mt-3 d-block text-center">Continue Shopping</a>
            </div>

            <div class="mt-5">
    <div class="row">
        <div class="col-md-4">
            <input type="text" class="form-control mb-2" name="first_name" placeholder="First Name" required>
        </div>
        <div class="col-md-4">
            <input type="text" class="form-control mb-2" name="last_name" placeholder="Last Name" required>
        </div>
        <div class="col-md-4">
            <input type="email" class="form-control mb-2" name="email" placeholder="Email" required>
        </div>
        <div class="col-md-6">
            <input type="text" class="form-control mb-2" name="phone_number" placeholder="Phone Number" required>
        </div>
        <div class="col-md-6">
            <input type="text" class="form-control mb-2" name="description" placeholder="Description" value="Order from MeatFresh">
        </div>
    </div>

<button type="submit" class="btn-primary-custom mt-3 w-100" id="checkout-submit-btn">
    <span class="btn-text">Proceed with Payment</span>
    <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true" id="btn-loader"></span>
</button>


</div>
        </div>

    </section>


    
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartContainer = document.getElementById('cart-container');

            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon"><i class="fas fa-shopping-cart"></i></div>
                        <h3>Your cart is empty</h3>
                        <p>Add some delicious items to get started!</p>
                    </div>
                `;
                updateSummary();
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${item.image}" alt="${item.title}" class="cart-item-image me-3" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 80 80%27%3E%3Crect width=%2780%27 height=%2780%27 fill=%27%23ddd%27/%3E%3Ctext x=%2740%27 y=%2740%27 text-anchor=%27middle%27 dy=%27.3em%27 fill=%27%23666%27 font-family=%27Arial%27 font-size=%2712%27%3EImage Not Found%3C/text%3E%3C/svg%3E'">
                            <span class="cart-item-title">${item.title}</span>
                        </div>
                    </td>
                    <td class="cart-item-price">${item.price.toFixed(2)} TZS</td>
                    <td class="quantity-controls">
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">−</button>
                        <span class="qty-display">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                    </td>
                    <td>${(item.price * item.quantity).toFixed(2)} TZS</td>
                    <td><button class="btn-remove" onclick="removeItem('${item.id}')">Remove</button></td>
                </tr>
            `).join('');

            updateSummary();
        }

        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + change);
                saveCart();
                renderCart();
            }
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            renderCart();
        }

        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
           // const deliveryFee = cart.length > 0 ? 5 : 0;
    //const tax = subtotal * 0.05;
           // const total = subtotal + deliveryFee + tax;
            const total = subtotal;

            document.getElementById('subtotal').textContent = `${subtotal.toFixed(2)} TZS`;
           // document.getElementById('delivery').textContent = `$${deliveryFee.toFixed(2)}`;
           // document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `${total.toFixed(2)} TZS`;
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            const cartBadge = document.getElementById('cart-count');
            cartBadge.textContent = cart.reduce((total, item) => total + item.quantity, 0);
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty! Add some items first.');
                return;
            }
            alert('Proceeding to checkout...');
        }

        renderCart();

        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                navbar.style.backdropFilter = 'blur(10px)';
            } else {
                navbar.style.background = '#fff';
                navbar.style.backdropFilter = 'none';
            }


 $('#checkout-submit-btn').on('click', function () {
    if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
    }

    $(this).attr('disabled', true);
    $('#btn-loader').removeClass('d-none');
    $('.btn-text').text('Processing...');

    const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const total = subtotal;

    // Manually collect input values
    const payload = {
        first_name: $('input[name="first_name"]').val(),
        last_name: $('input[name="last_name"]').val(),
        email: $('input[name="email"]').val(),
        phone_number: $('input[name="phone_number"]').val(),
        description: $('input[name="description"]').val() || 'Order from MeatFresh',
        amount: total.toFixed(2),
        currency: 'TZS'
    };

    console.log('Payload:', payload);

    $.ajax({
        url: 'https://chickens-farms-production-6aa9.up.railway.app/api/payment/initiate',
        method: 'POST',
        data: JSON.stringify(payload),
        contentType: 'application/json',
        success: function(response) {
            $('#checkout-submit-btn').attr('disabled', false);
            $('#btn-loader').addClass('d-none');
            $('.btn-text').text('Proceed with Payment');

            if (response.success && response.redirect_url) {
                window.location.href = response.redirect_url;
            } else {
                alert(response.message || 'Payment initiation failed.');
            }
        },
        error: function(err) {
            $('#checkout-submit-btn').attr('disabled', false);
            $('#btn-loader').addClass('d-none');
            $('.btn-text').text('Proceed with Payment');
            console.error(err);
        }
    });
});



        });
    </script>
</body>
</html>
